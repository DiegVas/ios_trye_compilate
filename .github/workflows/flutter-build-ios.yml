name: Flutter iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Permite ejecución manual para ahorrar minutos

jobs:
  build-ios:
    name: 🍎 Flutter iOS Build
    runs-on: macos-14 # Versión estable para Xcode 15.4/16

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: "stable"
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Reconstruct iOS Folder
        run: |
          echo "🗑️ Limpiando carpeta ios..."
          rm -rf ios
          flutter create --platforms ios .
          echo "✅ Carpeta ios regenerada."

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # Cachear los Pods acelera el build significativamente
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Build iOS (no codesign)
        run: |
          # Flutter detectará que falta el Podfile y ejecutará 'pod install' solo
          flutter build ios --release --no-codesign --verbose

      - name: Upload iOS build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-no-codesign
          path: build/ios/iphoneos/
          retention-days: 7
