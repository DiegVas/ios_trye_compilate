name: Flutter iOS Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: 🍎 Flutter iOS Build
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instalar Flutter ─────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0" # ← Cambia a tu versión de Flutter
          channel: "stable"
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── 3. Instalar dependencias Dart/Flutter ───────────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      # ── 4. Regenerar carpeta ios (clave: el proyecto venía de Windows) ──────
      #       En Windows flutter no genera ios/. Este paso la crea en el runner.
      - name: Generate iOS folder
        run: |
          echo "🔍 Verificando carpeta ios..."

          if [ ! -d "ios" ] || [ -z "$(ls -A ios 2>/dev/null)" ]; then
            echo "📂 Carpeta ios vacía o inexistente — creando con flutter create..."
            # --platforms ios regenera SOLO la carpeta ios sin tocar el resto
            flutter create --platforms ios .
            echo "✅ Carpeta ios generada correctamente"
          else
            echo "✅ Carpeta ios encontrada"
          fi

      # ── 5. Configurar Ruby + CocoaPods ──────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods

      # ── 6. Caché de CocoaPods ───────────────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-

      # ── 7. Pod install ───────────────────────────────────────────────────────
      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # ── 8. Seleccionar Xcode ─────────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── 9. Build iOS — Simulador (sin certificados de firma) ─────────────────
      - name: Build iOS (no codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --verbose

      # ── ALTERNATIVA: build directo con xcodebuild ────────────────────────────
      # Descomenta si prefieres control fino sobre el scheme/workspace:
      #
      # - name: Build with xcodebuild
      #   run: |
      #     cd ios
      #     xcodebuild \
      #       -workspace Runner.xcworkspace \
      #       -scheme Runner \
      #       -configuration Release \
      #       -destination 'generic/platform=iOS Simulator' \
      #       -derivedDataPath build \
      #       CODE_SIGN_IDENTITY="" \
      #       CODE_SIGNING_REQUIRED=NO \
      #       CODE_SIGNING_ALLOWED=NO \
      #       | xcpretty --color --simple

      # ── 10. (Opcional) Archivar .ipa con certificados ────────────────────────
      #        Requiere secrets configurados en tu repo de GitHub.
      #        Descomenta cuando tengas firma configurada.
      #
      # - name: Install Apple certificates
      #   uses: apple-actions/import-codesign-certs@v3
      #   with:
      #     p12-file-base64: ${{ secrets.APPLE_P12_BASE64 }}
      #     p12-password: ${{ secrets.APPLE_P12_PASSWORD }}
      #
      # - name: Install provisioning profile
      #   uses: apple-actions/download-provisioning-profiles@v3
      #   with:
      #     bundle-id: com.tuempresa.tuapp   # ← Cambia a tu bundle ID
      #     issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
      #     api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
      #     api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      #
      # - name: Build signed IPA
      #   run: |
      #     flutter build ipa \
      #       --release \
      #       --export-options-plist=ios/ExportOptions.plist

      # ── 11. Subir artefactos ─────────────────────────────────────────────────
      - name: Upload iOS build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-${{ github.sha }}
          path: |
            build/ios/iphoneos/
            build/ios/ipa/
          if-no-files-found: warn
          retention-days: 14

      # ── 12. Resumen del build ────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🍎 Flutter iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rama | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | macos-latest |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | 3.22.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Codesign | ❌ (simulador) |" >> $GITHUB_STEP_SUMMARY
