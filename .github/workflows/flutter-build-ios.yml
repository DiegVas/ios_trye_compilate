name: Flutter iOS Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    name: 🍎 Flutter iOS Build
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Instalar Flutter ─────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6" # ✅ Dart ^3.10.8 requerido por pubspec
          channel: "stable"
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── 3. Instalar dependencias Dart/Flutter ───────────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      # ── 4. Regenerar carpeta ios ─────────────────────────────────────────────
      #   El proyecto fue creado en Windows, que no genera ios/.
      #   Se elimina siempre (puede estar incompleta) y se regenera
      #   con flutter create para garantizar un Podfile válido.
      - name: Generate iOS folder
        run: |
          echo "🗑️  Eliminando carpeta ios incompleta (si existe)..."
          rm -rf ios

          echo "📂 Generando carpeta ios con flutter create..."
          flutter create --platforms ios .

          echo "✅ Carpeta ios generada. Contenido:"
          ls -la ios/

          echo "📄 Verificando Podfile..."
          if [ ! -f "ios/Podfile" ]; then
            echo "❌ ERROR: Podfile no encontrado tras flutter create"
            exit 1
          fi
          echo "✅ Podfile encontrado"

      # ── 5. Configurar Ruby + CocoaPods ──────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install CocoaPods
        run: gem install cocoapods

      # ── 6. Caché de CocoaPods ───────────────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-

      # ── 7. Pod install ───────────────────────────────────────────────────────
      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # ── 8. Seleccionar Xcode ─────────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── 9. Build iOS sin firma ───────────────────────────────────────────────
      - name: Build iOS (no codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --verbose

      # ── 10. (Opcional) Build firmado para App Store ───────────────────────────
      #        Descomenta cuando tengas certificados en GitHub Secrets.
      #
      # - name: Install Apple certificates
      #   uses: apple-actions/import-codesign-certs@v3
      #   with:
      #     p12-file-base64: ${{ secrets.APPLE_P12_BASE64 }}
      #     p12-password: ${{ secrets.APPLE_P12_PASSWORD }}
      #
      # - name: Install provisioning profile
      #   uses: apple-actions/download-provisioning-profiles@v3
      #   with:
      #     bundle-id: com.tuempresa.tuapp
      #     issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
      #     api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
      #     api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      #
      # - name: Build signed IPA
      #   run: |
      #     flutter build ipa \
      #       --release \
      #       --export-options-plist=ios/ExportOptions.plist

      # ── 11. Subir artefactos ─────────────────────────────────────────────────
      - name: Upload iOS build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-${{ github.sha }}
          path: |
            build/ios/iphoneos/
            build/ios/ipa/
          if-no-files-found: warn
          retention-days: 14

      # ── 12. Resumen del build ────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 🍎 Flutter iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rama | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | macos-latest |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | 3.41.6 |" >> $GITHUB_STEP_SUMMARY
          echo "| Codesign | ❌ (sin firma) |" >> $GITHUB_STEP_SUMMARY
